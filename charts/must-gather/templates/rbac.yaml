{{- if and .Values.rbac.create (ne (.Values.rbac.scope | default "cluster") "cluster") -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "rhdh-must-gather.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rhdh-must-gather.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "endpoints", "configmaps", "secrets", "events", "persistentvolumeclaims", "serviceaccounts", "replicationcontrollers", "resourcequotas", "limitranges"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list"]
  - apiGroups: ["rhdh.redhat.com"]
    resources: ["backstages"]
    verbs: ["get", "list"]
  - apiGroups: ["operators.coreos.com"]
    resources: ["subscriptions", "clusterserviceversions", "installplans", "catalogsources", "operatorgroups"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"] # NOSONAR - exec is required to collect data from the running containers
    verbs: ["create"]
  - apiGroups: ["sonataflow.org"]
    resources: ["sonataflowplatforms", "sonataflows", "sonataflowbuilds"]
    verbs: ["get", "list"]
  - apiGroups: ["operator.knative.dev"]
    resources: ["knativeservings", "knativeeventings"]
    verbs: ["get", "list"]
  - apiGroups: ["operator.serverless.openshift.io"]
    resources: ["knativekafkas"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "rhdh-must-gather.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rhdh-must-gather.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "rhdh-must-gather.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "rhdh-must-gather.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
