resources:
  ragInit:
    requests:
      cpu: 50m
      memory: 150Mi
    limits:
      cpu: 100m
      memory: 500Mi
  lightspeedCore:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi
runtimeVolume:
  name: lightspeed-data
  mountPath: /tmp
  type: emptyDir
  emptyDir: {}
  persistentVolumeClaim: {}
ragVolume:
  name: lightspeed-rag
  initMountPath: /rag-content
  mountPath: /rag-content
  emptyDir: {}
configMaps:
  - name: stack
    nameOverride: ""
    mountPath: /app-root/lightspeed-stack.yaml
    subPath: lightspeed-stack.yaml
    sourceFile: lightspeed-stack.yaml
    optional: false
  - name: config
    nameOverride: ""
    mountPath: /app-root/config.yaml
    subPath: config.yaml
    sourceFile: config.yaml
    optional: false
  - name: rhdh-profile
    nameOverride: ""
    mountPath: /app-root/rhdh-profile.py
    subPath: rhdh-profile.py
    sourceFile: rhdh-profile.py
    optional: false
secret:
  create: true
  name: ""
  optional: false
  sourceFile: secret.yaml
initContainer:
  name: lightspeed-rag-init
  imagePullPolicy: IfNotPresent
  command:
    - sh
    - -c
  args:
    - >-
      mkdir -p /tmp/data &&
      echo 'Copying Lightspeed RAG data...' &&
      cp -r /rag/vector_db /rag-content/ &&
      cp -r /rag/embeddings_model /rag-content/ &&
      echo 'Copy complete.'
  env: []
  resources:
    requests:
      cpu: 50m
      memory: 150Mi
    limits:
      cpu: 100m
      memory: 500Mi
  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    runAsNonRoot: true
    seccompProfile:
      type: "RuntimeDefault"
sidecar:
  name: lightspeed-core
  imagePullPolicy: IfNotPresent
  portName: http-lightspeed
  containerPort: 8080
  command: []
  args: []
  env: []
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi
  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    runAsNonRoot: true
    seccompProfile:
      type: "RuntimeDefault"
